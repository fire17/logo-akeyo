<!doctype html>
<meta charset="utf-8">
<title>Tesseract — redirecting</title>
<meta name="robots" content="noindex">
<script>
  // Pages serves 404.html for any unknown path; forward it rather than dead-end.
  location.replace('https://tesseract.akeyo.io' + location.pathname + location.search + location.hash);
</script>
<meta http-equiv="refresh" content="0; url=https://tesseract.akeyo.io/">
